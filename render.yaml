services:
  - type: web
    name: hypertrophy-rag-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: MALLOC_ARENA_MAX
        value: "2"
      - key: MALLOC_ARENA_MAX
        value: "2"